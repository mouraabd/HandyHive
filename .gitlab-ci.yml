image: eclipse-temurin:21-jdk-alpine

# Define variables to optimize Gradle
variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/
    - HandyHive-Backend/.gradle/
    - HandyHive-Backend/build/

stages:
  - test

backend-test:
  stage: test

  # ✅ FIX 1: Use the standard postgres image and alias it clearly
  services:
    - name: postgres:15-alpine
      alias: postgres

  # ✅ FIX 2: Set the specific variables required for the 'postgres' service
  variables:
    POSTGRES_DB: handyhive_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    POSTGRES_HOST_AUTH_METHOD: trust

    # Configure Spring Boot to connect to the 'postgres' service alias
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/handyhive_test"
    SPRING_DATASOURCE_USERNAME: "postgres"
    SPRING_DATASOURCE_PASSWORD: "2005"
    SPRING_JPA_HIBERNATE_DDL_AUTO: "create-drop"

  script:
    - echo "🚀 Starting Pipeline..."
    - cd HandyHive-Backend
    - chmod +x gradlew
    # ✅ FIX 3: Wait for DB to be ready before running tests (prevents connection refused)
    - echo "Waiting for Database..."
    - until nc -z postgres 5432; do sleep 1; done
    - echo "Database is UP! Running tests..."
    - ./gradlew test

  artifacts:
    when: always
    reports:
      junit: HandyHive-Backend/build/test-results/test/**/TEST-*.xml