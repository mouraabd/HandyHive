image: eclipse-temurin:21-jdk-alpine

# Define variables to optimize Gradle
variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/
    - HandyHive-Backend/.gradle/
    - HandyHive-Backend/build/

stages:
  - test

backend-test:
  stage: test

  # ✅ 1. Service: Spin up Postgres
  services:
    - name: postgres:15-alpine
      alias: postgres

  # ✅ 2. Variables: Configure connection to the 'postgres' alias
  variables:
    POSTGRES_DB: handyhive_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: password
    POSTGRES_HOST_AUTH_METHOD: trust

    # Overrides application.properties to use the CI database
    SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/handyhive_test"
    SPRING_DATASOURCE_USERNAME: "postgres"
    SPRING_DATASOURCE_PASSWORD: "2005"
    SPRING_JPA_HIBERNATE_DDL_AUTO: "create-drop"

  script:
    - echo "🚀 Starting Pipeline..."
    - cd HandyHive-Backend

    # ✅ 3. Install Netcat (nc) to check when DB is ready
    - apk add --no-cache netcat-openbsd

    - chmod +x gradlew

    # ✅ 4. Wait loop: Don't start tests until Postgres is actually listening
    - echo "Waiting for Database..."
    - while ! nc -z postgres 5432; do sleep 1; done
    - echo "Database is UP! Running tests..."

    # ✅ 5. Run the tests
    - ./gradlew test

  artifacts:
    when: always
    reports:
      junit: HandyHive-Backend/build/test-results/test/**/TEST-*.xml