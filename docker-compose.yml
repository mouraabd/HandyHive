version: '3.8'

services:
  # 1. Database Service
  postgres:
    image: postgres:15-alpine
    container_name: handyhive_db
    environment:
      POSTGRES_DB: handyhive_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2005
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Backend Application Service
  app:
    build: ./HandyHive-Backend
    container_name: handyhive_backend
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Override application.properties to talk to the 'postgres' container
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/handyhive_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 2005
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: