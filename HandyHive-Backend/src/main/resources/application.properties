# Server Port
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/handyhive
spring.datasource.username=postgres
spring.datasource.password=2005

# JPA / Hibernate
# CRITICAL: Use 'create-drop' to wipe old bad data, then switch back to 'update' later
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Error Logging (Show us WHY it fails)
server.error.include-message=always
server.error.include-stacktrace=always

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true

# JSON Configuration (Fixes Date Errors)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false

spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never