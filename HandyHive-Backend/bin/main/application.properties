# ===============================
# =  SERVER CONFIGURATION
# ===============================
server.port=8082

# ===============================
# =  DATABASE CONNECTION
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/handyhive
spring.datasource.username=handyhive
spring.datasource.password=2005
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# =  JPA / HIBERNATE CONFIGURATION
# ===============================
# Automatically update schema without dropping tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Dialect for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# =  SQL SCRIPT INITIALIZATION
# ===============================
# Always run schema/data scripts, but handle duplicates gracefully
#spring.sql.init.mode=always
#spring.sql.init.encoding=UTF-8

# Optional: explicitly specify scripts (if they are not named schema.sql or data.sql)
#spring.sql.init.data-locations=classpath:data.sql

# ===============================
# =  LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
