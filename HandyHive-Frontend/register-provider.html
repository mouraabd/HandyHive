<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Provider Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="max-width: 540px; width: 100%;">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-warning">HandyHive</h3>
        <p class="text-muted">Join as a Service Provider</p>
    </div>

    <form id="regForm" onsubmit="handleRegister(event)">
        <div class="row g-2">
            <div class="col-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" id="firstName" class="form-control" required>
            </div>
            <div class="col-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" id="lastName" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" id="phone" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required>
        </div>

        <!-- ✅ Services selection -->
        <div class="mb-3">
            <label class="form-label fw-bold">Services you provide</label>
            <div id="servicesBox" class="border rounded p-2 bg-white" style="max-height: 140px; overflow-y: auto;">
                <div class="text-muted small">Loading services...</div>
            </div>
            <div class="form-text">Select at least 1 service (required for customers to find you).</div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Upload Vetting Document (ID/Certificate)</label>
            <input type="file" id="vettingDoc" class="form-control" accept=".pdf,.jpg,.png">
            <div class="form-text">Optional. (You can still register without it.)</div>
        </div>

        <button type="submit" class="btn btn-warning w-100 fw-bold">Create Account</button>
    </form>

    <div class="text-center mt-3">
        <small>Want to hire? <a href="login.html">Register as Customer</a></small>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8082";
    let loadedServices = [];

    async function loadServices() {
        const box = document.getElementById("servicesBox");
        try {
            const res = await fetch(`${API_BASE}/api/services`);
            if (!res.ok) throw new Error("Failed /api/services");
            loadedServices = await res.json();

            if (!Array.isArray(loadedServices) || loadedServices.length === 0) {
                box.innerHTML = `<div class="text-danger small">No services found in backend.</div>`;
                return;
            }

            box.innerHTML = loadedServices.map(s => {
                const id = s.serviceId ?? s.id;
                const name = s.name ?? "Service";
                return `
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="serviceIds" value="${id}" id="svc_${id}">
                        <label class="form-check-label" for="svc_${id}">${name}</label>
                    </div>
                `;
            }).join("");

        } catch (e) {
            console.error(e);
            box.innerHTML = `<div class="text-danger small">Cannot load services. Is backend running?</div>`;
        }
    }

    async function handleRegister(e) {
        e.preventDefault();

        const selected = Array.from(document.querySelectorAll('input[name="serviceIds"]:checked'))
            .map(cb => cb.value);

        if (selected.length === 0) {
            alert("Please select at least 1 service you provide.");
            return;
        }

        const formData = new FormData();
        formData.append("firstName", document.getElementById("firstName").value);
        formData.append("lastName", document.getElementById("lastName").value);
        formData.append("email", document.getElementById("email").value);
        formData.append("password", document.getElementById("password").value);
        formData.append("phone", document.getElementById("phone").value);
        formData.append("bio", "New Service Provider");

        // ✅ IMPORTANT: send repeated serviceIds so Spring binds List<Long>
        selected.forEach(id => formData.append("serviceIds", id));

        const fileInput = document.getElementById("vettingDoc");
        if (fileInput.files.length > 0) {
            formData.append("document", fileInput.files[0]);
        }

        try {
            const response = await fetch(`${API_BASE}/api/providers`, {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                alert("Account created successfully! You can now log in.");
                window.location.href = "login.html";
            } else {
                const errorText = await response.text();
                alert("Registration failed: " + errorText);
            }
        } catch (error) {
            console.error(error);
            alert("Server connection error.");
        }
    }

    window.onload = loadServices;
</script>

</body>
</html>
