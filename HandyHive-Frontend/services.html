<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .service-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
            user-select: none;
        }
        .service-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* ✅ Active State (Green Border + Icon) */
        .service-card.active {
            border-color: #198754;
            background-color: #f0fff4;
        }
        .check-icon {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #198754;
            display: none;
        }
        .service-card.active .check-icon { display: block; }

        .summary-box { position: sticky; top: 20px; }
        .cart-item { font-size: 0.9rem; border-bottom: 1px solid #444; padding: 5px 0; }

        /* RTL support */
        body[dir="rtl"] { text-align: right; }
        body[dir="rtl"] .navbar-nav { margin-right: auto !important; margin-left: 0 !important; }
        body[dir="rtl"] .text-end { text-align: left !important; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning fs-3" href="index.html">HandyHive</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" href="services.html" data-i18n="nav_services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="my-jobs.html" data-i18n="nav_jobs">My Jobs</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html" data-i18n="nav_profile">Profile</a></li>

                <li class="nav-item ms-2">
                    <select class="form-select form-select-sm border-dark fw-bold" id="langSelect" onchange="changeLanguage(this.value)">
                        <option value="en">🇺🇸 EN</option>
                        <option value="cz">🇨🇿 CZ</option>
                        <option value="ar">🇸🇦 AR</option>
                    </select>
                </li>

                <li class="nav-item ms-3">
                    <button onclick="logout()" class="btn btn-dark btn-sm px-3 rounded-pill" data-i18n="nav_logout">Log Out</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row">
        <div class="col-md-8">
            <h3 class="fw-bold mb-4" data-i18n="svc_title">Select Services</h3>
            <p class="text-muted mb-4" data-i18n="svc_sub">Click multiple cards to add them to your cart.</p>

            <div class="row g-3">
                <div class="col-md-6">
                    <div class="card service-card p-3 shadow-sm text-center h-100" onclick="toggleService(1, 1500, 'svc_plumbing', this)">
                        <i class="bi bi-check-circle-fill check-icon"></i>
                        <div class="card-body">
                            <i class="bi bi-droplet-fill text-primary display-4 mb-3"></i>
                            <h5 class="fw-bold" data-i18n="svc_plumbing">Plumbing</h5>
                            <span class="badge bg-light text-dark border">1500 Kč</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card service-card p-3 shadow-sm text-center h-100" onclick="toggleService(2, 2000, 'svc_electrician', this)">
                        <i class="bi bi-check-circle-fill check-icon"></i>
                        <div class="card-body">
                            <i class="bi bi-lightning-fill text-warning display-4 mb-3"></i>
                            <h5 class="fw-bold" data-i18n="svc_electrician">Electrician</h5>
                            <span class="badge bg-light text-dark border">2000 Kč</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card service-card p-3 shadow-sm text-center h-100" onclick="toggleService(3, 800, 'svc_handyman', this)">
                        <i class="bi bi-check-circle-fill check-icon"></i>
                        <div class="card-body">
                            <i class="bi bi-hammer text-secondary display-4 mb-3"></i>
                            <h5 class="fw-bold" data-i18n="svc_handyman">Handyman</h5>
                            <span class="badge bg-light text-dark border">800 Kč</span>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card service-card p-3 shadow-sm text-center h-100" onclick="toggleService(4, 2500, 'svc_cleaning', this)">
                        <i class="bi bi-check-circle-fill check-icon"></i>
                        <div class="card-body">
                            <i class="bi bi-stars text-info display-4 mb-3"></i>
                            <h5 class="fw-bold" data-i18n="svc_cleaning">Deep Cleaning</h5>
                            <span class="badge bg-light text-dark border">2500 Kč</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-dark text-white summary-box border-0 shadow-lg">
                <div class="card-header bg-black border-secondary py-3">
                    <h5 class="fw-bold m-0" data-i18n="cart_title">Your Cart</h5>
                </div>
                <div class="card-body">
                    <div id="cartList" class="mb-3">
                        <p class="text-white-50 small fst-italic" data-i18n="cart_empty">No services selected.</p>
                    </div>

                    <div class="d-flex justify-content-between align-items-center bg-secondary bg-opacity-25 p-3 rounded mb-3">
                        <div>
                            <label class="form-check-label fw-bold" for="urgentToggle" data-i18n="lbl_urgent">Urgent? ⚡</label>
                            <div class="text-white-50 small" style="font-size: 0.7rem;">+50 Kč</div>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="urgentToggle" onchange="renderCart()">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="text-white-50" data-i18n="lbl_total">Total:</span>
                        <h2 class="fw-bold text-white m-0" id="totalPriceDisplay">0 Kč</h2>
                    </div>

                    <button id="checkoutBtn" onclick="prepareCheckout()" class="btn btn-warning w-100 py-3 fw-bold fs-5 text-dark" disabled data-i18n="btn_checkout">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    let selectedServices = new Map();

    function toggleService(id, price, nameKey, cardElement) {
        if (selectedServices.has(id)) {
            selectedServices.delete(id);
            cardElement.classList.remove('active');
        } else {
            selectedServices.set(id, { id, price, nameKey });
            cardElement.classList.add('active');
        }
        renderCart();
    }

    function renderCart() {
        const cartList = document.getElementById('cartList');
        const isUrgent = document.getElementById('urgentToggle').checked;
        const checkoutBtn = document.getElementById('checkoutBtn');
        const lang = localStorage.getItem('appLang') || 'en';

        cartList.innerHTML = "";
        let total = 0;

        if (selectedServices.size === 0) {
            const emptyMsg = translations[lang]['cart_empty'] || "No services selected.";
            cartList.innerHTML = `<p class="text-white-50 small fst-italic">${emptyMsg}</p>`;
            checkoutBtn.disabled = true;
            document.getElementById('totalPriceDisplay').innerText = "0 Kč";
            return;
        }

        checkoutBtn.disabled = false;

        selectedServices.forEach(item => {
            const itemTotal = item.price + (isUrgent ? 50 : 0);
            total += itemTotal;
            // Translate the service name
            const displayName = translations[lang][item.nameKey] || item.nameKey;

            cartList.innerHTML += `
                <div class="d-flex justify-content-between cart-item">
                    <span>${displayName}</span>
                    <span>${itemTotal} Kč</span>
                </div>
            `;
        });

        document.getElementById('totalPriceDisplay').innerText = total + " Kč";
    }

    // Update cart items when language changes
    document.addEventListener('langChanged', () => {
        if(selectedServices.size > 0) renderCart();
    });

    async function prepareCheckout() {
        const isUrgent = document.getElementById('urgentToggle').checked;
        const checkoutBtn = document.getElementById('checkoutBtn');
        const lang = localStorage.getItem('appLang') || 'en';

        const originalText = checkoutBtn.innerText;
        checkoutBtn.innerText = "Finding Providers...";
        checkoutBtn.disabled = true;

        let finalCart = [];
        let missingProviders = [];

        try {
            for (let item of selectedServices.values()) {
                try {
                    const response = await fetch(`http://localhost:8082/api/providers/match/${item.id}`);
                    if (!response.ok) {
                        missingProviders.push(translations[lang][item.nameKey]);
                        continue;
                    }
                    const provider = await response.json();

                    // Use English Key for DB consistency
                    const displayName = translations['en'][item.nameKey];

                    finalCart.push({
                        type: 'service',
                        id: item.id,
                        providerId: provider.providerId,
                        price: item.price + (isUrgent ? 50 : 0),
                        name: `${displayName} (${provider.firstName})`,
                        urgent: isUrgent
                    });

                } catch (err) {
                    console.error("Network error");
                    missingProviders.push(translations[lang][item.nameKey]);
                }
            }

            if (missingProviders.length > 0) {
                alert(`⚠️ Warning: No providers for:\n- ${missingProviders.join("\n- ")}`);
            }

            if (finalCart.length === 0) {
                alert("Cannot proceed: No providers available.");
                checkoutBtn.innerText = originalText;
                checkoutBtn.disabled = false;
                return;
            }

            localStorage.setItem('handyhive_cart', JSON.stringify(finalCart));
            window.location.href = "checkout.html";

        } catch (error) {
            console.error(error);
            alert("Error.");
            checkoutBtn.innerText = originalText;
            checkoutBtn.disabled = false;
        }
    }

    function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }
    window.onload = function() { if (!JSON.parse(localStorage.getItem('user'))) window.location.href = 'login.html'; }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
