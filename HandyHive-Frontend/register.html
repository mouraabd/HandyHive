<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="hh-auth-page">

<div class="hh-auth-shell">
    <div class="hh-auth-brand d-none d-lg-flex">
        <img src="assets/Handyhive-logo.png" onerror="this.onerror=null; this.src='assets/handyhive-logo.png';" alt="HandyHive logo">        <h1>Join HandyHive</h1>
        <p>Create a customer account to book help, or join as a provider and receive jobs.</p>
    </div>

    <div class="card hh-register-card border-0 shadow-lg">
        <h2 class="text-center fw-bold mb-4">Create Account</h2>

        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

        <div class="mb-3 text-center">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="role" id="roleCustomer" value="customer" checked onchange="toggleProviderFields()">
                <label class="form-check-label fw-bold" for="roleCustomer">Customer</label>
            </div>

            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="role" id="roleProvider" value="provider" onchange="toggleProviderFields()">
                <label class="form-check-label fw-bold" for="roleProvider">Service Provider</label>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <input type="text" id="fname" class="form-control" placeholder="First Name" autocomplete="given-name">
            </div>
            <div class="col-6">
                <input type="text" id="lname" class="form-control" placeholder="Last Name" autocomplete="family-name">
            </div>
        </div>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email Address" autocomplete="email">

        <div class="input-group mb-3">
            <span class="input-group-text bg-white fw-bold text-muted border-end-0">+420</span>
            <input type="text" id="phone" class="form-control border-start-0" placeholder="777 123 456" inputmode="numeric" maxlength="11" autocomplete="tel">
        </div>

        <input type="password" id="pass" class="form-control mb-3" placeholder="Password" autocomplete="new-password">

        <div id="providerFields" class="d-none">
            <label class="small fw-bold mb-2 text-dark">Select services you provide:</label>

            <div id="servicesContainer" class="mb-3 border rounded p-3 bg-white" style="max-height: 190px; overflow-y: auto;">
                <div class="d-flex align-items-center gap-2 text-muted small">
                    <span class="spinner-border spinner-border-sm text-warning"></span>
                    Loading services...
                </div>
            </div>

            <label class="small fw-bold mb-2 text-dark">Upload ID / Certificate:</label>
            <input type="file" id="vettingDoc" class="form-control form-control-sm" accept=".pdf,.jpg,.jpeg,.png">
            <div class="form-text small mb-3">Optional for now. You can still register without it.</div>
        </div>

        <button onclick="register()" class="btn btn-brand w-100 mb-3">Register Now</button>

        <p class="text-center small mb-0">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script src="js/main.js"></script>
<script>
    const API_BASE = "https://handyhive-api.onrender.com";
    let servicesLoaded = false;
    let serviceLoadInProgress = false;

    function showError(msg) {
        const box = document.getElementById('errorAlert');
        box.innerText = msg;
        box.classList.remove('d-none');
    }

    function clearError() {
        document.getElementById('errorAlert').classList.add('d-none');
    }

    function toggleProviderFields() {
        const isProvider = document.getElementById('roleProvider').checked;
        const div = document.getElementById('providerFields');

        if (isProvider) {
            div.classList.remove('d-none');
            if (!servicesLoaded && !serviceLoadInProgress) loadServices();
        } else {
            div.classList.add('d-none');
        }
    }

    function renderServiceCheckboxes(list) {
        const box = document.getElementById('servicesContainer');

        if (!Array.isArray(list) || list.length === 0) {
            servicesLoaded = false;
            box.innerHTML = `
                <div class="alert alert-warning py-2 px-3 mb-2 small">
                    No services were found in the database. The backend seeder should create default services after redeploy.
                </div>
                <button type="button" class="btn btn-sm btn-outline-dark w-100" onclick="loadServices(true)">Retry loading services</button>
            `;
            return;
        }

        servicesLoaded = true;
        box.innerHTML = list.map(s => {
            const id = s.serviceId ?? s.id;
            const name = s.name ?? s.serviceName ?? 'Service';
            const description = s.description ? `<div class="small text-muted ms-4">${s.description}</div>` : '';

            return `
                <div class="form-check py-1">
                    <input class="form-check-input svc-chk" type="checkbox" value="${id}" id="svc_${id}">
                    <label class="form-check-label fw-semibold" for="svc_${id}">${name}</label>
                    ${description}
                </div>
            `;
        }).join('');
    }

    function renderServicesError(message) {
        const box = document.getElementById('servicesContainer');
        servicesLoaded = false;
        box.innerHTML = `
            <div class="alert alert-warning py-2 px-3 mb-2 small">
                ${message}<br>
                The free Render/Neon server can take around 50 seconds to wake up.
            </div>
            <button type="button" class="btn btn-sm btn-outline-dark w-100" onclick="loadServices(true)">Retry loading services</button>
        `;
    }

    async function readResponse(res) {
        const raw = await res.text();
        if (!raw) return null;
        try { return JSON.parse(raw); } catch { return raw; }
    }

    async function loadServices(force = false) {
        if (servicesLoaded && !force) return;

        const box = document.getElementById('servicesContainer');
        serviceLoadInProgress = true;
        box.innerHTML = `
            <div class="d-flex align-items-center gap-2 text-muted small">
                <span class="spinner-border spinner-border-sm text-warning"></span>
                Loading services from backend...
            </div>
        `;

        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 90000);

        try {
            showLoading('Loading services... The free server can take around 50 seconds to wake up.');

            const res = await fetch(`${API_BASE}/api/services`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' },
                signal: controller.signal
            });

            const data = await readResponse(res);

            if (!res.ok) {
                throw new Error(readErrorMessage(data, `Cannot load services. HTTP ${res.status}`));
            }

            renderServiceCheckboxes(data);
        } catch (e) {
            console.error('Service loading failed:', e);
            renderServicesError(e.name === 'AbortError' ? 'Loading services timed out.' : (e.message || 'Cannot load services.'));
        } finally {
            clearTimeout(timeoutId);
            serviceLoadInProgress = false;
            hideLoading();
        }
    }

    async function register() {
        const role = document.querySelector('input[name="role"]:checked').value;
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const pass = document.getElementById('pass').value;

        try {
            clearError();

            if (!fname || !lname || !email || !phone || !pass) {
                throw new Error('Please fill all required fields.');
            }

            if (pass.length < 6) {
                throw new Error('Password must be at least 6 characters.');
            }

            const fullPhone = normalizeCzechPhoneInput(phone);
            let res;

            showLoading('Creating account...');

            if (role === 'provider') {
                const checked = Array.from(document.querySelectorAll('.svc-chk:checked')).map(cb => cb.value);

                if (!servicesLoaded) {
                    throw new Error('Services are not loaded yet. Click Retry loading services first.');
                }

                if (checked.length === 0) {
                    throw new Error('Please select at least 1 service you provide.');
                }

                const formData = new FormData();
                formData.append('firstName', fname);
                formData.append('lastName', lname);
                formData.append('email', email);
                formData.append('password', pass);
                formData.append('phone', fullPhone);
                formData.append('bio', 'New Service Provider');
                checked.forEach(v => formData.append('serviceIds', v));
                formData.append('serviceIdsCsv', checked.join(','));

                const fileInput = document.getElementById('vettingDoc');
                if (fileInput.files.length > 0) {
                    formData.append('document', fileInput.files[0]);
                }

                res = await fetch(`${API_BASE}/api/providers`, { method: 'POST', body: formData });
            } else {
                res = await fetch(`${API_BASE}/api/customers`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        firstName: fname,
                        lastName: lname,
                        email: email,
                        phoneNumber: fullPhone,

                        // Send all password field names so it works with both backend versions
                        passwordHash: pass,
                        rawPassword: pass,
                        password: pass
                    })
                });
            }

            const data = await readResponse(res);
            if (!res.ok) {
                throw new Error(readErrorMessage(data, `Registration failed. HTTP ${res.status}`));
            }

            const loginRes = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ email, password: pass })
            });

            const loginData = await readResponse(loginRes);

            if (loginRes.ok && loginData) {
                localStorage.setItem('user', JSON.stringify(loginData));
                localStorage.removeItem('handyhive_cart');
                window.location.href = loginData.role === 'PROVIDER' ? 'profile.html' : 'index.html';
            } else {
                alert('Registered successfully, but auto-login failed. Please log in manually.');
                window.location.href = 'login.html';
            }
        } catch (e) {
            console.error(e);
            showError(e.message || 'Registration failed.');
        } finally {
            hideLoading();
        }
    }

    function initRegisterPage() {
        attachCzechPhoneLimiter('phone');

        const params = new URLSearchParams(window.location.search);
        if (params.get('role') === 'provider') {
            document.getElementById('roleProvider').checked = true;
        }

        toggleProviderFields();
        loadServices();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initRegisterPage);
    } else {
        initRegisterPage();
    }
</script>

</body>
</html>
