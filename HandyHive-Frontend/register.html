<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-gold { background-color: #ffc107; }
        .btn-brand { background-color: #000; color: #fff; font-weight: bold; }
        .btn-brand:hover { background-color: #333; color: #fff; }
    </style>
</head>
<body class="bg-gold d-flex align-items-center justify-content-center vh-100">

<div class="card p-5 border-0 shadow-lg" style="max-width: 500px; border-radius: 20px; max-height: 90vh; overflow-y: auto;">
    <h2 class="text-center fw-bold mb-4">Create Account</h2>

    <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

    <div class="mb-3">
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="role" id="roleCustomer" value="customer" checked onchange="toggleProviderFields()">
            <label class="form-check-label fw-bold" for="roleCustomer">Customer</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="role" id="roleProvider" value="provider" onchange="toggleProviderFields()">
            <label class="form-check-label fw-bold" for="roleProvider">Service Provider</label>
        </div>
    </div>

    <div class="row g-2 mb-3">
        <div class="col-6"><input type="text" id="fname" class="form-control" placeholder="First Name"></div>
        <div class="col-6"><input type="text" id="lname" class="form-control" placeholder="Last Name"></div>
    </div>

    <input type="email" id="email" class="form-control mb-3" placeholder="Email Address">

    <div class="input-group mb-3">
        <span class="input-group-text bg-white fw-bold text-muted border-end-0">+420</span>
        <input type="text" id="phone" class="form-control border-start-0" placeholder="777 123 456">
    </div>

    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">

    <!-- Provider-only fields -->
    <div id="providerFields" class="d-none">
        <label class="small fw-bold mb-2 text-dark">Select Services you provide:</label>

        <!-- ✅ dynamic services go here -->
        <div id="servicesContainer" class="mb-3 border rounded p-2 bg-white" style="max-height: 160px; overflow-y: auto;">
            <div class="text-muted small">Loading services...</div>
        </div>

        <label class="small fw-bold mb-2 text-dark">Upload ID / Certificate:</label>
        <input type="file" id="vettingDoc" class="form-control form-control-sm" accept=".pdf,.jpg,.png">
        <div class="form-text small">Required for verification badge.</div>
    </div>

    <button onclick="register()" class="btn btn-brand w-100 mb-3">Register Now</button>
    <p class="text-center small">Already have an account? <a href="login.html">Login</a></p>
</div>

<script>
    const API_BASE = "https://handyhive-api.onrender.com";

    function toggleProviderFields() {
        const isProvider = document.getElementById('roleProvider').checked;
        const div = document.getElementById('providerFields');
        if (isProvider) div.classList.remove('d-none');
        else div.classList.add('d-none');
    }

    async function loadServices() {
        const box = document.getElementById("servicesContainer");
        try {
            const res = await fetch(`${API_BASE}/api/services`);
            if (!res.ok) throw new Error("Failed /api/services");

            const list = await res.json();
            if (!Array.isArray(list) || list.length === 0) {
                box.innerHTML = `<div class="text-danger small">No services found in backend.</div>`;
                return;
            }

            box.innerHTML = list.map(s => {
                const id = s.serviceId ?? s.id;
                const name = s.name ?? "Service";
                return `
                    <div class="form-check">
                        <input class="form-check-input svc-chk" type="checkbox" value="${id}" id="svc_${id}">
                        <label class="form-check-label" for="svc_${id}">${name}</label>
                    </div>
                `;
            }).join("");

        } catch (e) {
            console.error(e);
            box.innerHTML = `<div class="text-danger small">Cannot load services. Is backend running?</div>`;
        }
    }

    async function register() {
        const role = document.querySelector('input[name="role"]:checked').value;

        const fname = document.getElementById("fname").value.trim();
        const lname = document.getElementById("lname").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const pass = document.getElementById("pass").value;

        const fullPhone = "+420 " + phone;

        try {
            document.getElementById('errorAlert').classList.add('d-none');

            if (!fname || !lname || !email || !phone || !pass) {
                throw new Error("Please fill all required fields.");
            }

            let res;

            if (role === 'provider') {
                const checked = Array.from(document.querySelectorAll('.svc-chk:checked')).map(cb => cb.value);
                if (checked.length === 0) {
                    throw new Error("Please select at least 1 service you provide.");
                }

                const formData = new FormData();
                formData.append("firstName", fname);
                formData.append("lastName", lname);
                formData.append("email", email);
                formData.append("password", pass);
                formData.append("phone", fullPhone);
                formData.append("bio", "New Service Provider");

                // ✅ send repeated serviceIds (Spring binds List<Long>)
                checked.forEach(v => formData.append("serviceIds", v));

                const fileInput = document.getElementById("vettingDoc");
                if (fileInput.files.length > 0) {
                    formData.append("document", fileInput.files[0]);
                }

                res = await fetch(`${API_BASE}/api/providers`, {
                    method: "POST",
                    body: formData
                });

            } else {
                const payload = {
                    firstName: fname,
                    lastName: lname,
                    email: email,
                    phoneNumber: fullPhone,
                    passwordHash: pass
                };

                res = await fetch(`${API_BASE}/api/customers`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            }

            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(errorText || `Server Error: ${res.status}`);
            }

            const data = await res.json();

            // auto login after register
            const loginRes = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pass })
            });

            if (loginRes.ok) {
                const loginData = await loginRes.json();
                const finalId = (role === 'customer') ? data.id : (data.providerId || data.id);

                const user = {
                    id: finalId,
                    providerId: (role === 'provider') ? finalId : null,
                    email: email,
                    role: role.toUpperCase(),
                    token: loginData.token
                };

                localStorage.setItem("user", JSON.stringify(user));
                window.location.href = "services.html";
            } else {
                alert("Registered, but auto-login failed. Please login manually.");
                window.location.href = "login.html";
            }

        } catch (e) {
            console.error(e);
            showError(e.message);
        }
    }

    function showError(msg) {
        const box = document.getElementById('errorAlert');
        box.innerText = msg;
        box.classList.remove('d-none');
    }

    window.onload = async () => {
        toggleProviderFields();
        await loadServices();
    };
</script>

</body>
</html>
