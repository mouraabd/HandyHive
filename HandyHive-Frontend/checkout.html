<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Secure Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .checkout-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        .amount-display { font-size: 2.5rem; font-weight: bold; color: #0d6efd; margin: 1rem 0; }
        .form-control { background-color: #f1f3f5; border: none; height: 50px; margin-bottom: 1rem; }
        .btn-pay { background-color: #ffc107; color: black; font-weight: bold; height: 50px; width: 100%; border-radius: 8px; border: none; }
        .btn-pay:hover { background-color: #e0a800; }
        .item-list { text-align: left; background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; max-height: 100px; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 5px 0; }
        .item-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="checkout-card">
    <h4 class="mb-3 text-muted">TOTAL AMOUNT</h4>
    <div class="amount-display" id="totalAmount">0 Kč</div>

    <div id="orderSummary" class="item-list d-none">
    </div>

    <form id="paymentForm">
        <label class="text-start d-block fw-bold small text-muted">Card Number</label>
        <input type="text" id="cardNumber" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>

        <div class="row">
            <div class="col-6">
                <label class="text-start d-block fw-bold small text-muted">Expiry</label>
                <input type="text" id="expiry" class="form-control" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="col-6">
                <label class="text-start d-block fw-bold small text-muted">CVV</label>
                <input type="text" id="cvv" class="form-control" placeholder="123" maxlength="3" required>
            </div>
        </div>

        <button type="submit" class="btn-pay mt-2">Pay & Confirm</button>
        <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="history.back()">Cancel</button>
    </form>
</div>

<script>
    const API_BASE = "https://handyhive-api.onrender.com";

    // --- 1. INPUT FORMATTING LOGIC ---

    document.getElementById('cardNumber').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '').substring(0, 16);
        e.target.value = value.replace(/(\d{4})(?=\d)/g, '$1 ').trim();
    });

    document.getElementById('expiry').addEventListener('input', function (e) {
        let value = e.target.value.replace(/\D/g, '').substring(0, 4);
        e.target.value = value.length >= 3 ? value.substring(0, 2) + '/' + value.substring(2) : value;
    });

    document.getElementById('cvv').addEventListener('input', function (e) {
        e.target.value = e.target.value.replace(/\D/g, '').substring(0, 3);
    });

    // --- 2. CART STATE ---

    let cartItems = [];
    let isSubscription = false;

    function readCartFromStorage() {
        try {
            return JSON.parse(localStorage.getItem('handyhive_cart')) || [];
        } catch (e) {
            console.error('Invalid cart in localStorage:', e);
            localStorage.removeItem('handyhive_cart');
            return [];
        }
    }

    function money(value) {
        return `${Number(value || 0)} Kč`;
    }

    (function init() {
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        // Single item checkout, mainly used by subscription page.
        if (type === 'service' || type === 'subscription') {
            isSubscription = (type === 'subscription');
            cartItems.push({
                type,
                id: Number(params.get('id')),
                serviceId: Number(params.get('id')),
                price: Number(params.get('price') || 0),
                urgent: params.get('urgent') === 'true',
                providerId: params.get('providerId') ? Number(params.get('providerId')) : null,
                name: type === 'subscription' ? 'Selected Subscription' : 'Selected Service'
            });
        } else {
            cartItems = readCartFromStorage();
        }

        const list = document.getElementById('orderSummary');
        if (cartItems.length > 0) {
            list.classList.remove('d-none');
            list.innerHTML = '';
            cartItems.forEach(item => {
                list.innerHTML += `
                    <div class="item-row">
                        <span>${item.name || 'Service'}</span>
                        <strong>${money(item.price)}</strong>
                    </div>`;
            });
        }

        const total = cartItems.reduce((sum, item) => sum + Number(item.price || 0), 0);
        document.getElementById('totalAmount').innerText = money(total);
    })();

    // --- 3. API HELPERS ---

    async function requestJson(url, options = {}) {
        const response = await fetch(url, options);
        const raw = await response.text();

        let data = null;
        if (raw) {
            try { data = JSON.parse(raw); }
            catch { data = raw; }
        }

        if (!response.ok) {
            const serverMessage =
                (data && typeof data === 'object' && (data.message || data.error)) ||
                (typeof data === 'string' && data) ||
                `${response.status} ${response.statusText}`;
            throw new Error(serverMessage);
        }

        return data;
    }

    async function findProviderForItem(item) {
        const serviceId = Number(item.serviceId || item.id);
        if (!serviceId) throw new Error('Missing serviceId in cart item. Clear the cart and select the service again.');

        const provider = await requestJson(`${API_BASE}/api/providers/match/${serviceId}?urgent=${Boolean(item.urgent)}`);
        const providerId = Number(provider.providerId || provider.id);
        if (!providerId) throw new Error('Backend matched a provider, but the response did not contain providerId.');

        return providerId;
    }

    async function processServiceItem(item, user) {
        if (user.role !== 'CUSTOMER') {
            throw new Error('Only customer accounts can buy services. Please log in as a customer account.');
        }

        const serviceId = Number(item.serviceId || item.id);
        if (!serviceId) throw new Error('Missing serviceId. Clear the cart and select the service again.');

        let providerId = item.providerId ? Number(item.providerId) : null;
        if (!providerId) {
            // Safety fallback for old/stale carts in localStorage.
            providerId = await findProviderForItem(item);
        }

        return requestJson(`${API_BASE}/api/jobs`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
                userId: Number(user.id),
                providerId,
                serviceId,
                isUrgent: Boolean(item.urgent),
                description: `Booked via Secure Checkout${item.name ? ': ' + item.name : ''}`
            })
        });
    }

    async function processSubscriptionItem(item, user) {
        if (user.role !== 'PROVIDER') {
            throw new Error('Only provider accounts can buy subscriptions. Please log in as a provider account.');
        }

        const providerId = Number(user.providerId || user.id);
        const planId = Number(item.id);
        if (!providerId || !planId) throw new Error('Missing providerId or planId for subscription checkout.');

        return requestJson(`${API_BASE}/api/providers/${providerId}/subscription?planId=${planId}`, {
            method: 'PUT',
            headers: { 'Accept': 'application/json' }
        });
    }

    // --- 4. PAYMENT PROCESS LOOP ---

    document.getElementById('paymentForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const button = e.target.querySelector('.btn-pay');
        const originalButtonText = button.innerText;
        button.disabled = true;
        button.innerText = 'Processing...';

        try {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                alert('Please log in.');
                window.location.href = 'login.html';
                return;
            }

            if (cartItems.length === 0) {
                alert('Your cart is empty. Please select a service first.');
                window.location.href = 'services.html';
                return;
            }

            let successCount = 0;

            for (let i = 0; i < cartItems.length; i++) {
                const item = cartItems[i];
                try {
                    if (item.type === 'service') {
                        await processServiceItem(item, user);
                    } else if (item.type === 'subscription') {
                        await processSubscriptionItem(item, user);
                    } else {
                        throw new Error(`Unknown cart item type: ${item.type || 'empty'}`);
                    }
                    successCount++;
                } catch (error) {
                    console.error('Checkout item failed:', item, error);
                    alert(`Could not process item #${i + 1}: ${item.name || 'Service'}\n\nReason: ${error.message}`);
                    return;
                }
            }

            alert(`Payment Successful! ${successCount} item(s) processed. ✅`);
            localStorage.removeItem('handyhive_cart');
            window.location.href = isSubscription ? 'profile.html' : 'my-jobs.html';

        } catch (error) {
            console.error('Checkout failed:', error);
            alert(`Checkout failed: ${error.message}`);
        } finally {
            button.disabled = false;
            button.innerText = originalButtonText;
        }
    });
</script>


</body>
</html>
