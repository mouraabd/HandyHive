<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - My Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; transition: all 0.3s ease; }
        .job-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        .urgent-badge { background-color: #dc3545; color: white; font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; }

        /* RTL Specific Adjustments */
        body[dir="rtl"] { text-align: right; }
        body[dir="rtl"] .navbar-nav { margin-right: auto !important; margin-left: 0 !important; }
        body[dir="rtl"] .ms-auto { margin-right: auto !important; margin-left: 0 !important; }
    </style>
</head>
<body>

<div class="position-absolute top-0 end-0 p-3" style="z-index: 1050;">
    <select class="form-select form-select-sm border-dark fw-bold shadow-sm" id="langSelect" onchange="changeLanguage(this.value)">
        <option value="en">🇺🇸 EN</option>
        <option value="cz">🇨🇿 CZ</option>
        <option value="ar">🇸🇦 AR</option>
    </select>
</div>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-warning fs-3" href="index.html">HandyHive</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="services.html" data-i18n="nav_services">Services</a></li>
                <li class="nav-item"><a class="nav-link active fw-bold" href="my-jobs.html" data-i18n="nav_jobs">My Jobs</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html" data-i18n="nav_profile">Profile</a></li>
                <li class="nav-item ms-3">
                    <button onclick="logout()" class="btn btn-dark btn-sm px-3 rounded-pill" data-i18n="nav_logout">Log Out</button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" id="roleTitle" data-i18n="title_jobs">My Jobs</h2>
        <span class="badge bg-dark" id="roleBadge" data-i18n="loading">Loading...</span>
    </div>

    <div class="row g-4" id="jobsContainer">
        <div class="text-center mt-5 w-100">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2 text-muted" data-i18n="loading">Loading your jobs...</p>
        </div>
    </div>
</div>

<div class="modal fade" id="jobModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning border-0">
                <h5 class="modal-title fw-bold text-dark" data-i18n="modal_title">Job Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h4 class="fw-bold mb-1" id="modalServiceName">Service Name</h4>
                        <small class="text-muted" id="modalId">JOB #0</small>
                    </div>
                    <span class="badge bg-secondary" id="modalStatus">STATUS</span>
                </div>

                <div id="modalUrgent" class="mb-3 d-none">
                    <span class="urgent-badge" data-i18n="modal_urgent">⚡ URGENT REQUEST</span>
                </div>

                <hr>

                <div class="mb-3">
                    <label class="small text-muted fw-bold" id="modalOtherPartyLabel" data-i18n="label_provider">PROVIDER</label>
                    <p class="fw-bold text-primary" id="modalOtherPartyName">Unknown</p>
                </div>

                <div class="mb-3">
                    <label class="small text-muted fw-bold" data-i18n="modal_desc">DESCRIPTION</label>
                    <p id="modalDesc">No description provided.</p>
                </div>

                <div class="mb-3">
                    <label class="small text-muted fw-bold" data-i18n="modal_date">DATE CREATED</label>
                    <p id="modalDate">--/--/----</p>
                </div>
            </div>

            <div class="modal-footer justify-content-between bg-light">
                <div id="providerActions" class="d-none w-100 d-flex justify-content-between">
                    <button class="btn btn-outline-danger" onclick="updateJobStatus('CANCELLED')">
                        <i class="bi bi-x-circle"></i> <span data-i18n="btn_decline">Decline</span>
                    </button>

                    <button class="btn btn-success" onclick="updateJobStatus('COMPLETED')">
                        <i class="bi bi-check-circle-fill"></i> <span data-i18n="btn_resolve">Mark Resolved</span>
                    </button>
                </div>

                <button type="button" id="defaultCloseBtn" class="btn btn-secondary ms-auto" data-bs-dismiss="modal" data-i18n="btn_close">Close</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- 🌍 TRANSLATION LOGIC ---
    const translations = {
        en: {
            nav_home: "Home", nav_services: "Services", nav_jobs: "My Jobs", nav_profile: "Profile", nav_logout: "Log Out",
            title_jobs: "My Jobs", loading: "Loading...",
            role_provider: "Provider View", role_customer: "Customer View",
            header_requests: "Job Requests", header_orders: "My Orders",
            no_jobs: "No jobs found.",
            status_PENDING: "PENDING", status_COMPLETED: "COMPLETED", status_CANCELLED: "CANCELLED", status_IN_PROGRESS: "IN PROGRESS",
            label_customer: "CUSTOMER", label_provider: "PROVIDER",
            unknown: "Unknown", date_pending: "Date Pending",
            modal_title: "Job Details", modal_urgent: "⚡ URGENT REQUEST", modal_desc: "DESCRIPTION", modal_date: "DATE CREATED",
            btn_decline: "Decline", btn_resolve: "Mark Resolved", btn_close: "Close",
            confirm_finish: "Mark this job as finished?", confirm_decline: "Are you sure you want to decline?",
            success_update: "Status updated successfully!", fail_update: "Failed to update status.", server_error: "Server error."
        },
        cz: {
            nav_home: "Domů", nav_services: "Služby", nav_jobs: "Moje zakázky", nav_profile: "Profil", nav_logout: "Odhlásit",
            title_jobs: "Moje zakázky", loading: "Načítání...",
            role_provider: "Pohled poskytovatele", role_customer: "Pohled zákazníka",
            header_requests: "Žádosti o práci", header_orders: "Moje objednávky",
            no_jobs: "Žádné zakázky nenalezeny.",
            status_PENDING: "ČEKAJÍCÍ", status_COMPLETED: "DOKONČENO", status_CANCELLED: "ZRUŠENO", status_IN_PROGRESS: "V PROCESU",
            label_customer: "ZÁKAZNÍK", label_provider: "POSKYTOVATEL",
            unknown: "Neznámý", date_pending: "Datum čeká",
            modal_title: "Detaily zakázky", modal_urgent: "⚡ URGENTNÍ", modal_desc: "POPIS", modal_date: "DATUM VYTVOŘENÍ",
            btn_decline: "Odmítnout", btn_resolve: "Hotovo", btn_close: "Zavřít",
            confirm_finish: "Označit zakázku jako dokončenou?", confirm_decline: "Opravdu chcete odmítnout tuto zakázku?",
            success_update: "Stav úspěšně aktualizován!", fail_update: "Aktualizace selhala.", server_error: "Chyba serveru."
        },
        ar: {
            nav_home: "الرئيسية", nav_services: "الخدمات", nav_jobs: "وظائفي", nav_profile: "الملف الشخصي", nav_logout: "خروج",
            title_jobs: "وظائفي", loading: "جار التحميل...",
            role_provider: "عرض المزود", role_customer: "عرض العميل",
            header_requests: "طلبات العمل", header_orders: "طلباتي",
            no_jobs: "لا توجد وظائف.",
            status_PENDING: "قيد الانتظار", status_COMPLETED: "مكتمل", status_CANCELLED: "ملغى", status_IN_PROGRESS: "قيد التنفيذ",
            label_customer: "العميل", label_provider: "المزود",
            unknown: "غير معروف", date_pending: "التاريخ معلق",
            modal_title: "تفاصيل الوظيفة", modal_urgent: "⚡ طلب عاجل", modal_desc: "الوصف", modal_date: "تاريخ الإنشاء",
            btn_decline: "رفض", btn_resolve: "تم الإنجاز", btn_close: "إغلاق",
            confirm_finish: "هل أنت متأكد من إتمام العمل؟", confirm_decline: "هل تريد رفض هذا الطلب؟",
            success_update: "تم تحديث الحالة بنجاح!", fail_update: "فشل التحديث.", server_error: "خطأ في الخادم."
        }
    };

    let currentLang = 'en';

    function changeLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];

        // 1. Update Static Text
        document.querySelectorAll("[data-i18n]").forEach(el => {
            const key = el.getAttribute("data-i18n");
            if (t[key]) el.innerText = t[key];
        });

        // 2. Handle RTL for Arabic
        if (lang === 'ar') {
            document.documentElement.setAttribute('dir', 'rtl');
            document.documentElement.lang = 'ar';
        } else {
            document.documentElement.removeAttribute('dir');
            document.documentElement.lang = lang;
        }

        // 3. Reload Jobs to apply translations to dynamic content
        loadJobs();
    }

    // --- ⚙️ JOB LOGIC ---
    let currentJobId = null;

    async function loadJobs() {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) { window.location.href = "login.html"; return; }

        const t = translations[currentLang];
        const isProvider = user.role === 'PROVIDER';

        // Update Headers based on role and language
        document.getElementById('roleTitle').innerText = isProvider ? t.header_requests : t.header_orders;
        document.getElementById('roleBadge').innerText = isProvider ? t.role_provider : t.role_customer;

        let url = isProvider
            ? `http://localhost:8082/api/jobs/provider/${user.id || user.providerId}`
            : `http://localhost:8082/api/jobs/customer/${user.id}`;

        try {
            const response = await fetch(url);
            const jobs = await response.json();
            const container = document.getElementById('jobsContainer');
            container.innerHTML = "";

            if (jobs.length === 0) {
                container.innerHTML = `<div class="col-12 text-center text-muted py-5"><h4>${t.no_jobs}</h4></div>`;
                return;
            }

            jobs.forEach(job => {
                let badgeClass = "bg-secondary";
                if(job.status === 'PENDING') badgeClass = "bg-warning text-dark";
                else if(job.status === 'COMPLETED') badgeClass = "bg-success";
                else if(job.status === 'CANCELLED') badgeClass = "bg-danger";
                else if(job.status === 'IN_PROGRESS') badgeClass = "bg-primary";

                // Translate Status
                const translatedStatus = t[`status_${job.status}`] || job.status;

                const dateDisplay = job.dateCreated ? new Date(job.dateCreated).toLocaleDateString() : t.date_pending;

                let otherPartyLabel = isProvider ? t.label_customer : t.label_provider;
                let otherPartyName = t.unknown;

                if (isProvider && job.customer) otherPartyName = job.customer.firstName + " " + job.customer.lastName;
                else if (!isProvider && job.provider) otherPartyName = job.provider.firstName + " " + job.provider.lastName;

                const card = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card job-card p-3 h-100 shadow-sm" onclick='openJobDetails(${JSON.stringify(job).replace(/'/g, "&apos;")})'>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="badge ${badgeClass}">${translatedStatus}</span>
                                <small class="text-muted">#${job.jobId}</small>
                            </div>
                            <h5 class="fw-bold text-truncate mb-1">${job.serviceName || "Service Request"}</h5>
                            <p class="small text-primary mb-2"><i class="bi bi-person-circle"></i> <strong>${otherPartyLabel}:</strong> ${otherPartyName}</p>
                            <p class="text-muted small text-truncate mb-3">${job.description || "No details provided"}</p>
                            <div class="mt-auto pt-2 border-top">
                                <small class="text-muted">📅 ${dateDisplay}</small>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } catch (error) { console.error("Error:", error); }
    }

    function openJobDetails(job) {
        currentJobId = job.jobId;
        const user = JSON.parse(localStorage.getItem('user'));
        const isProvider = user.role === 'PROVIDER';
        const t = translations[currentLang];

        document.getElementById('modalServiceName').innerText = job.serviceName || "Service Request";
        document.getElementById('modalId').innerText = "JOB #" + job.jobId;
        document.getElementById('modalDesc').innerText = job.description || "No description provided.";
        document.getElementById('modalDate').innerText = job.dateCreated ? new Date(job.dateCreated).toLocaleString() : t.date_pending;

        let otherPartyLabel = isProvider ? t.label_customer : t.label_provider;
        let otherPartyName = t.unknown;
        if (isProvider && job.customer) otherPartyName = job.customer.firstName + " " + job.customer.lastName;
        else if (!isProvider && job.provider) otherPartyName = job.provider.firstName + " " + job.provider.lastName;

        document.getElementById('modalOtherPartyLabel').innerText = otherPartyLabel;
        document.getElementById('modalOtherPartyName').innerText = otherPartyName;

        const badge = document.getElementById('modalStatus');
        badge.innerText = t[`status_${job.status}`] || job.status;

        badge.className = "badge fs-6 ";
        if(job.status === 'PENDING') badge.classList.add("bg-warning", "text-dark");
        else if(job.status === 'COMPLETED') badge.classList.add("bg-success");
        else if(job.status === 'CANCELLED') badge.classList.add("bg-danger");
        else badge.classList.add("bg-secondary");

        document.getElementById('modalUrgent').classList.toggle('d-none', !job.isUrgent);

        const actionsDiv = document.getElementById('providerActions');
        const closeBtn = document.getElementById('defaultCloseBtn');

        if (isProvider && (job.status === 'PENDING' || job.status === 'IN_PROGRESS')) {
            actionsDiv.classList.remove('d-none');
            closeBtn.classList.add('d-none');
        } else {
            actionsDiv.classList.add('d-none');
            closeBtn.classList.remove('d-none');
        }

        new bootstrap.Modal(document.getElementById('jobModal')).show();
    }

    async function updateJobStatus(newStatus) {
        if(!currentJobId) return;
        const t = translations[currentLang];

        let msg = newStatus === 'COMPLETED' ? t.confirm_finish : t.confirm_decline;
        if(!confirm(msg)) return;

        try {
            const response = await fetch(`http://localhost:8082/api/jobs/${currentJobId}/status?status=${newStatus}`, { method: 'PUT' });
            if (response.ok) {
                alert(t.success_update);
                location.reload();
            } else {
                alert(t.fail_update);
            }
        } catch (e) { alert(t.server_error); }
    }

    function logout() { localStorage.removeItem('user'); window.location.href = "login.html"; }

    // Initialize
    loadJobs();
</script>
</body>
</html>
