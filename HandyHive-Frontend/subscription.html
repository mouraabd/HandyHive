<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HandyHive - Choose Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        /* Dark overlay background */
        body { background-color: rgba(33, 37, 41, 0.9); }

        .modal-lookalike {
            background: #fff;
            border-radius: 12px;
            max-width: 850px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        /* Yellow Header matching the screenshot */
        .modal-header-custom {
            background-color: #ffc107;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plan-card {
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            height: 100%;
            transition: transform 0.3s;
        }
        .plan-card:hover { transform: translateY(-5px); }

        /* Left Card (White) */
        .card-light {
            background: #fff;
            border: 1px solid #dee2e6;
            color: #212529;
        }

        /* Right Card (Dark) */
        .card-dark {
            background: #212529;
            color: #fff;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative;
        }

        .price-tag { font-size: 2.5rem; font-weight: 800; margin: 15px 0; }
        .period { font-size: 1rem; font-weight: normal; opacity: 0.7; }

        .feature-list { list-style: none; padding: 0; margin: 20px 0; font-size: 0.9rem; text-align: left; display: inline-block;}
        .feature-list li { margin-bottom: 10px; }

        .btn-custom-light {
            background-color: #fff; color: #212529; font-weight: bold; border-radius: 6px; width: 100%; padding: 10px;
        }
        .btn-custom-outline {
            background-color: transparent; border: 1px solid #ced4da; color: #212529; font-weight: bold; border-radius: 6px; width: 100%; padding: 10px;
        }
        .btn-custom-outline:hover { background-color: #f8f9fa; }

        .recommended-badge {
            background-color: #ffc107;
            color: #000;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #212529;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-3">

<div class="modal-lookalike w-100">

    <div class="modal-header-custom">
        <h5 class="fw-bold mb-0 text-dark" data-i18n="header_manage">Manage Plan</h5>
        <a href="profile.html" class="btn-close" aria-label="Close"></a>
    </div>

    <div class="text-center p-5">
        <h2 class="fw-bold mb-2" data-i18n="sub_title">Find the Perfect Plan</h2>
        <p class="text-muted mb-5" data-i18n="sub_desc">Upgrade to get verified and attract more customers.</p>

        <div class="row g-4 justify-content-center px-lg-5">

            <div class="col-md-5">
                <div class="plan-card card-light">
                    <h4 class="fw-bold" data-i18n="plan_month_title">Monthly</h4>
                    <div class="price-tag">400 Kč <span class="period" data-i18n="price_mo">/mo</span></div>

                    <ul class="feature-list text-muted">
                        <li><i class="bi bi-check-circle-fill text-success me-2"></i> <span data-i18n="feat_priority">Priority Matching</span></li>
                        <li><i class="bi bi-check-circle-fill text-success me-2"></i> <span data-i18n="feat_nofees">No Platform Fees</span></li>
                        <li><i class="bi bi-check-circle-fill text-success me-2"></i> <span data-i18n="feat_cancel">Cancel Anytime</span></li>
                    </ul>

                    <button class="btn btn-custom-outline mt-auto" onclick="subscribe(2)" data-i18n="btn_sub_monthly">Subscribe Monthly</button>
                </div>
            </div>

            <div class="col-md-5">
                <div class="plan-card card-dark">
                    <div class="recommended-badge" data-i18n="badge_rec">RECOMMENDED</div>

                    <h4 class="fw-bold text-warning" data-i18n="plan_year_title">Annual</h4>
                    <div class="price-tag">4000 Kč <span class="period" data-i18n="price_yr">/yr</span></div>

                    <ul class="feature-list">
                        <li><i class="bi bi-patch-check-fill text-warning me-2"></i> <strong data-i18n="feat_vetted">Vetted Badge ✅</strong></li>
                        <li><i class="bi bi-star-fill text-warning me-2"></i> <span data-i18n="feat_featured">Featured Profile</span></li>
                        <li><i class="bi bi-gift-fill text-warning me-2"></i> <span data-i18n="feat_2months">2 Months Free</span></li>
                    </ul>

                    <button class="btn btn-custom-light mt-auto" onclick="subscribe(3)" data-i18n="btn_go_premium">Go Premium</button>
                </div>
            </div>

        </div>
    </div>

    <div class="bg-light p-3 text-center border-top">
        <a href="profile.html" class="text-muted text-decoration-none small" data-i18n="link_nothanks">No thanks, return to profile</a>
    </div>

</div>

<script src="js/main.js"></script>
<script>
    async function subscribe(planId) {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'PROVIDER') {
            alert("Please log in as a provider first.");
            window.location.href = "login.html";
            return;
        }

        const btns = document.querySelectorAll('button');

        // Visual Feedback
        btns.forEach(b => {
            b.disabled = true;
            b.style.opacity = "0.7";
        });

        try {
            // Plan 2 = Monthly, Plan 3 = Annual
            const response = await fetch(`https://handyhive-api.onrender.com/api/providers/${user.id}/subscription?planId=${planId}`, {
                method: 'PUT'
            });

            if (response.ok) {
                alert("Subscription activated successfully!");
                window.location.href = "profile.html";
            } else {
                alert("Failed to update subscription. Please try again.");
                btns.forEach(b => {
                    b.disabled = false;
                    b.style.opacity = "1";
                });
            }
        } catch (error) {
            console.error(error);
            alert("Server connection error.");
            btns.forEach(b => {
                b.disabled = false;
                b.style.opacity = "1";
            });
        }
    }
</script>

</body>
</html>
